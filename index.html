<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constelações</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0f;
            color: #e0d6c8;
            font-family: 'Lora', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        #nebulosa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 25% 30%, rgba(80, 60, 180, 0.08), transparent 50%),
                        radial-gradient(ellipse at 75% 70%, rgba(180, 80, 200, 0.06), transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(60, 120, 220, 0.05), transparent 50%);
            animation: nebulosaAnim 12s ease-in-out infinite alternate;
        }

        @keyframes nebulosaAnim {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.2) rotate(5deg);
                opacity: 1;
            }
            100% {
                transform: scale(0.9) rotate(-3deg);
                opacity: 0.7;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .titulo-principal {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 4vw, 3.2rem);
            color: #f0e6d0;
            text-shadow: 0 0 80px rgba(180, 150, 200, 0.4), 0 0 150px rgba(180, 150, 200, 0.1);
            letter-spacing: 0.3em;
            text-align: center;
            padding: 2rem 1rem 1.2rem;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            flex-shrink: 0;
            position: relative;
        }

        .titulo-principal::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(180, 150, 200, 0.4), transparent);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .constelacoes-wrapper {
            display: flex;
            flex: 1;
            width: 100%;
            min-height: 0;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0.5rem;
            gap: 0;
        }

        .lado {
            flex: 1 1 23%;
            min-width: 120px;
            max-width: 25%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            padding: 0.8rem 0.3rem;
            background: transparent;
            border: none;
            opacity: 0;
            animation: fadeInLado 1.8s ease forwards;
            height: 100%;
        }

        .lado::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 0;
            border-radius: 0;
        }

        .lado:hover::before {
            opacity: 1;
        }

        .lado:hover {
            transform: scale(1.05);
        }

        .lado-aquario {
            animation-delay: 0.2s;
        }
        .lado-cancer {
            animation-delay: 0.4s;
        }
        .lado-leao {
            animation-delay: 0.6s;
        }
        .lado-capricornio {
            animation-delay: 0.8s;
        }

        @keyframes fadeInLado {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .divisoria {
            width: 1px;
            height: 50%;
            background: linear-gradient(to bottom, transparent, rgba(180, 150, 200, 0.15), transparent);
            flex-shrink: 0;
            z-index: 2;
            position: relative;
        }

        .lado-conteudo {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.3rem;
        }

        .simbolo-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            font-size: 3.5rem;
            font-family: 'Cinzel', serif;
            animation: respirar 3s ease-in-out infinite;
        }

        @keyframes respirar {
            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.05));
            }
            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.12));
            }
        }

        .lado:hover .simbolo-wrapper {
            animation: none;
            transform: rotate(8deg) scale(1.1);
        }

        .simbolo-wrapper::before {
            content: '';
            position: absolute;
            width: 180%;
            height: 180%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04), transparent 70%);
            opacity: 0;
            transition: opacity 1s ease;
            z-index: -1;
        }

        .lado:hover .simbolo-wrapper::before {
            opacity: 1;
        }

        .simbolo-wrapper .orbita {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.04);
            animation: orbitar 20s linear infinite;
            pointer-events: none;
        }

        .simbolo-wrapper .orbita-1 {
            width: 160%;
            height: 160%;
        }

        .simbolo-wrapper .orbita-2 {
            width: 200%;
            height: 200%;
            animation-duration: 30s;
            animation-direction: reverse;
        }

        @keyframes orbitar {
            to {
                transform: rotate(360deg);
            }
        }

        .simbolo-svg {
            width: 80%;
            height: 80%;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.05));
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            z-index: 1;
        }

        .lado:hover .simbolo-svg {
            filter: drop-shadow(0 0 60px rgba(255, 255, 255, 0.15));
        }

        .particula {
            position: absolute;
            border-radius: 50%;
            background: #ffffff;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            z-index: 0;
        }

        .lado:hover .particula {
            opacity: 0.4;
        }

        .lado-nome {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.8rem, 1.5vw, 1.3rem);
            margin-top: 0.5rem;
            letter-spacing: 0.15em;
            transition: all 0.4s ease;
            font-weight: 400;
        }

        .lado:hover .lado-nome {
            letter-spacing: 0.25em;
        }

        .linha-decorativa {
            width: 20px;
            height: 1px;
            margin-top: 0.2rem;
            transition: all 0.6s ease;
            opacity: 0.3;
        }

        .lado:hover .linha-decorativa {
            width: 35px;
            opacity: 0.8;
        }

        /* ============================================================
           CORES
        ============================================================ */
        .lado-aquario .simbolo-svg {
            color: #7a9cff;
        }
        .lado-aquario .simbolo-svg .traco {
            stroke: #7a9cff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .lado-aquario .simbolo-svg .preenchimento {
            fill: #7a9cff;
            opacity: 0.3;
        }
        .lado-aquario .lado-nome {
            color: #7a9cff;
        }
        .lado-aquario .linha-decorativa {
            background: linear-gradient(to right, transparent, #7a9cff, transparent);
        }
        .lado-aquario::before {
            background: radial-gradient(ellipse at center, rgba(122, 156, 255, 0.05), transparent 70%);
        }
        .lado-aquario:hover::before {
            background: radial-gradient(ellipse at center, rgba(122, 156, 255, 0.12), transparent 70%);
        }
        .lado-aquario .particula {
            background: #7a9cff;
            box-shadow: 0 0 10px rgba(122, 156, 255, 0.3);
        }

        .lado-cancer .simbolo-svg {
            color: #66cc99;
        }
        .lado-cancer .simbolo-svg .traco {
            stroke: #66cc99;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .lado-cancer .simbolo-svg .preenchimento {
            fill: #66cc99;
            opacity: 0.3;
        }
        .lado-cancer .lado-nome {
            color: #66cc99;
        }
        .lado-cancer .linha-decorativa {
            background: linear-gradient(to right, transparent, #66cc99, transparent);
        }
        .lado-cancer::before {
            background: radial-gradient(ellipse at center, rgba(102, 204, 153, 0.05), transparent 70%);
        }
        .lado-cancer:hover::before {
            background: radial-gradient(ellipse at center, rgba(102, 204, 153, 0.12), transparent 70%);
        }
        .lado-cancer .particula {
            background: #66cc99;
            box-shadow: 0 0 10px rgba(102, 204, 153, 0.3);
        }

        .lado-leao .simbolo-svg {
            color: #ffaa44;
        }
        .lado-leao .simbolo-svg .traco {
            stroke: #ffaa44;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .lado-leao .simbolo-svg .preenchimento {
            fill: #ffaa44;
            opacity: 0.3;
        }
        .lado-leao .lado-nome {
            color: #ffaa44;
        }
        .lado-leao .linha-decorativa {
            background: linear-gradient(to right, transparent, #ffaa44, transparent);
        }
        .lado-leao::before {
            background: radial-gradient(ellipse at center, rgba(255, 170, 68, 0.05), transparent 70%);
        }
        .lado-leao:hover::before {
            background: radial-gradient(ellipse at center, rgba(255, 170, 68, 0.12), transparent 70%);
        }
        .lado-leao .particula {
            background: #ffaa44;
            box-shadow: 0 0 10px rgba(255, 170, 68, 0.3);
        }

        .lado-capricornio .simbolo-svg {
            color: #d4a373;
        }
        .lado-capricornio .simbolo-svg .traco {
            stroke: #d4a373;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .lado-capricornio .simbolo-svg .preenchimento {
            fill: #d4a373;
            opacity: 0.3;
        }
        .lado-capricornio .lado-nome {
            color: #d4a373;
        }
        .lado-capricornio .linha-decorativa {
            background: linear-gradient(to right, transparent, #d4a373, transparent);
        }
        .lado-capricornio::before {
            background: radial-gradient(ellipse at center, rgba(212, 163, 115, 0.05), transparent 70%);
        }
        .lado-capricornio:hover::before {
            background: radial-gradient(ellipse at center, rgba(212, 163, 115, 0.12), transparent 70%);
        }
        .lado-capricornio .particula {
            background: #d4a373;
            box-shadow: 0 0 10px rgba(212, 163, 115, 0.3);
        }

        @media (max-width: 768px) {
            .constelacoes-wrapper {
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 0;
            }

            .lado {
                flex: 1 1 45%;
                max-width: 48%;
                min-width: 100px;
                padding: 0.5rem 0.2rem;
                min-height: 30vh;
            }

            .divisoria {
                display: none;
            }

            .simbolo-wrapper {
                width: 70px;
                height: 70px;
                font-size: 2.8rem;
            }

            .simbolo-wrapper .orbita-1 {
                width: 150%;
                height: 150%;
            }
            .simbolo-wrapper .orbita-2 {
                width: 180%;
                height: 180%;
            }

            .titulo-principal {
                padding: 1rem 1rem 0.5rem;
                font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            }

            .lado-nome {
                font-size: clamp(0.8rem, 2vw, 1rem);
                margin-top: 0.3rem;
            }

            .linha-decorativa {
                width: 15px;
                margin-top: 0.2rem;
            }

            .lado:hover .linha-decorativa {
                width: 25px;
            }
        }

        @media (max-width: 480px) {
            .lado {
                flex: 1 1 100%;
                max-width: 100%;
                padding: 0.3rem;
                min-height: 20vh;
            }

            .simbolo-wrapper {
                width: 55px;
                height: 55px;
                font-size: 2rem;
            }
            .lado-nome {
                font-size: 0.7rem;
                margin-top: 0.2rem;
            }
            .titulo-principal {
                font-size: 0.9rem;
                padding: 0.5rem 0.3rem 0.2rem;
                letter-spacing: 0.15em;
            }
            .titulo-principal::after {
                width: 50px;
            }
            .simbolo-wrapper .orbita-1,
            .simbolo-wrapper .orbita-2 {
                display: none;
            }
            .linha-decorativa {
                width: 12px;
                margin-top: 0.1rem;
            }
            .lado:hover .linha-decorativa {
                width: 20px;
            }
        }

        .music-control {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 10;
            background: rgba(20, 15, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(180, 150, 200, 0.15);
            color: #d4c8e8;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .music-control:hover {
            background: rgba(40, 30, 60, 0.9);
            border-color: #b8aed0;
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(180, 150, 200, 0.1);
        }
    </style>
</head>
<body>

    <div id="nebulosa"></div>

    <canvas id="stars-canvas"></canvas>

    <button class="music-control" id="musicBtn" aria-label="Controle de música">🔊</button>

    <div class="container">

        <h1 class="titulo-principal">
            ✦ Constelações ✦
        </h1>

        <div class="constelacoes-wrapper">

            <!-- ===================== AQUÁRIO ===================== -->
            <div class="lado lado-aquario" data-destino="aquario.html" data-estrela="Aquário">
                <div class="lado-conteudo">
                    <div class="simbolo-wrapper">
                        <span class="particula" style="top:5%;left:10%;width:3px;height:3px;"></span>
                        <span class="particula" style="top:15%;right:5%;width:2px;height:2px;"></span>
                        <span class="particula" style="bottom:20%;left:5%;width:4px;height:4px;"></span>
                        <span class="particula" style="bottom:5%;right:15%;width:2px;height:2px;"></span>
                        <span class="particula" style="top:40%;left:-10%;width:3px;height:3px;"></span>
                        <span class="particula" style="top:50%;right:-8%;width:2px;height:2px;"></span>

                        <span class="orbita orbita-1"></span>
                        <span class="orbita orbita-2"></span>

                        <svg class="simbolo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path class="traco" d="M15 55 C25 45, 35 65, 45 55 C55 45, 65 65, 75 55 C85 45, 90 55, 90 55" />
                            <path class="traco" d="M15 70 C25 60, 35 80, 45 70 C55 60, 65 80, 75 70 C85 60, 90 70, 90 70" />
                            <path class="traco" d="M50 55 L50 25" />
                            <path class="traco" d="M50 25 C50 15, 40 20, 35 15" />
                            <path class="traco" d="M50 25 C50 15, 60 20, 65 15" />
                            <circle class="preenchimento" cx="35" cy="15" r="3" />
                            <circle class="preenchimento" cx="65" cy="15" r="3" />
                            <circle class="preenchimento" cx="50" cy="10" r="2" />
                        </svg>
                    </div>
                    <span class="lado-nome">Aquário</span>
                    <span class="linha-decorativa"></span>
                </div>
            </div>

            <!-- ===================== DIVISÓRIA ===================== -->
            <div class="divisoria"></div>

            <!-- ===================== CÂNCER ===================== -->
            <div class="lado lado-cancer" data-destino="cancer.html" data-estrela="Câncer">
                <div class="lado-conteudo">
                    <div class="simbolo-wrapper">
                        <span class="particula" style="top:8%;left:8%;width:2px;height:2px;"></span>
                        <span class="particula" style="top:20%;right:10%;width:3px;height:3px;"></span>
                        <span class="particula" style="bottom:15%;left:12%;width:2px;height:2px;"></span>
                        <span class="particula" style="bottom:10%;right:8%;width:3px;height:3px;"></span>
                        <span class="particula" style="top:50%;left:-8%;width:2px;height:2px;"></span>
                        <span class="particula" style="top:40%;right:-10%;width:3px;height:3px;"></span>

                        <span class="orbita orbita-1"></span>
                        <span class="orbita orbita-2"></span>

                        <svg class="simbolo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path class="traco" d="M30 40 C20 25, 40 15, 50 25 C60 15, 80 25, 70 40" />
                            <path class="traco" d="M35 45 L30 60" />
                            <path class="traco" d="M65 45 L70 60" />
                            <path class="traco" d="M30 40 C22 35, 18 28, 25 22" />
                            <path class="traco" d="M70 40 C78 35, 82 28, 75 22" />
                            <circle class="preenchimento" cx="42" cy="30" r="2.5" />
                            <circle class="preenchimento" cx="58" cy="30" r="2.5" />
                            <path class="traco" d="M35 45 C40 55, 60 55, 65 45" />
                            <path class="traco" d="M38 48 C35 58, 28 62, 25 70" />
                            <path class="traco" d="M45 50 C42 60, 40 68, 42 75" />
                            <path class="traco" d="M55 50 C58 60, 60 68, 58 75" />
                            <path class="traco" d="M62 48 C65 58, 72 62, 75 70" />
                        </svg>
                    </div>
                    <span class="lado-nome">Câncer</span>
                    <span class="linha-decorativa"></span>
                </div>
            </div>

            <!-- ===================== DIVISÓRIA ===================== -->
            <div class="divisoria"></div>

            <!-- ===================== LEÃO ===================== -->
            <div class="lado lado-leao" data-destino="leao.html" data-estrela="Leão">
                <div class="lado-conteudo">
                    <div class="simbolo-wrapper">
                        <span class="particula" style="top:8%;right:12%;width:2px;height:2px;"></span>
                        <span class="particula" style="top:20%;left:8%;width:3px;height:3px;"></span>
                        <span class="particula" style="bottom:15%;right:6%;width:2px;height:2px;"></span>
                        <span class="particula" style="bottom:8%;left:12%;width:3px;height:3px;"></span>
                        <span class="particula" style="top:45%;right:-10%;width:2px;height:2px;"></span>

                        <span class="orbita orbita-1"></span>
                        <span class="orbita orbita-2"></span>

                        <svg class="simbolo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path class="traco" d="M30 75 C30 55, 40 45, 55 45 C70 45, 80 55, 80 75" />
                            <path class="traco" d="M55 45 C55 30, 70 25, 75 35 C80 45, 70 50, 55 45" />
                            <path class="traco" d="M55 45 C45 30, 35 35, 40 45 C45 55, 55 50, 55 45" />

                            <path class="traco" d="M65 35 C68 25, 75 28, 72 38" />
                            <path class="traco" d="M70 30 C75 22, 80 30, 75 38" />
                            <path class="traco" d="M30 75 C20 75, 15 65, 20 55 C25 45, 30 50, 25 60" />
                            <circle class="preenchimento" cx="20" cy="55" r="3" />
                            <path class="traco" d="M35 75 L33 85" />
                            <path class="traco" d="M45 75 L43 85" />
                            <path class="traco" d="M65 75 L63 85" />
                            <path class="traco" d="M75 75 L73 85" />
                        </svg>
                    </div>
                    <span class="lado-nome">Leão</span>
                    <span class="linha-decorativa"></span>
                </div>
            </div>

            <!-- ===================== DIVISÓRIA ===================== -->
            <div class="divisoria"></div>

            <!-- ===================== CAPRICÓRNIO ===================== -->
            <div class="lado lado-capricornio" data-destino="capricornio.html" data-estrela="Capricórnio">
                <div class="lado-conteudo">
                    <div class="simbolo-wrapper">
                        <span class="particula" style="top:5%;right:15%;width:2px;height:2px;"></span>
                        <span class="particula" style="top:25%;left:5%;width:3px;height:3px;"></span>
                        <span class="particula" style="bottom:20%;right:8%;width:2px;height:2px;"></span>
                        <span class="particula" style="bottom:10%;left:12%;width:3px;height:3px;"></span>
                        <span class="particula" style="top:50%;left:-12%;width:2px;height:2px;"></span>
                        <span class="particula" style="top:35%;right:-8%;width:3px;height:3px;"></span>

                        <span class="orbita orbita-1"></span>
                        <span class="orbita orbita-2"></span>

                        <svg class="simbolo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path class="traco" d="M30 70 C30 50, 45 40, 55 40 C65 40, 75 50, 75 70" />
                            <path class="traco" d="M30 70 C25 60, 20 55, 25 48 C30 42, 40 45, 38 55" />
                            <path class="traco" d="M25 48 C20 38, 15 42, 18 35" />
                            <path class="traco" d="M28 45 C25 35, 22 38, 24 30" />
                            <circle class="preenchimento" cx="30" cy="52" r="2" />
                            <path class="traco" d="M75 70 C85 70, 90 60, 85 50 C80 42, 75 48, 78 55" />
                            <path class="traco" d="M80 55 C85 50, 88 55, 82 60" />
                            <path class="traco" d="M45 70 L42 82" />
                            <path class="traco" d="M55 70 L52 82" />
                            <path class="traco" d="M65 70 L62 82" />
                            <circle class="preenchimento" cx="42" cy="82" r="2.5" />
                            <circle class="preenchimento" cx="52" cy="82" r="2.5" />
                            <circle class="preenchimento" cx="62" cy="82" r="2.5" />
                        </svg>
                    </div>
                    <span class="lado-nome">Capricórnio</span>
                    <span class="linha-decorativa"></span>
                </div>
            </div>

        </div>

    </div>

    <script>
        // ============================================================
        // ESTRELAS CADENTES
        // ============================================================
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const stars = [];
        for (let i = 0; i < 220; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.5 + 0.5,
                alpha: Math.random() * 0.8 + 0.2,
                speed: Math.random() * 0.008 + 0.003,
            });
        }

        let meteors = [];

        function spawnMeteor() {
            const x = Math.random() * W * 0.8 + W * 0.1;
            const y = Math.random() * H * 0.3;
            const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5;
            const speed = 6 + Math.random() * 10;
            const life = 120 + Math.random() * 100;
            meteors.push({
                x,
                y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life,
                maxLife: life,
                size: 2 + Math.random() * 2
            });
        }

        setInterval(() => {
            if (meteors.length < 6) spawnMeteor();
        }, 3000 + Math.random() * 4000);

        for (let i = 0; i < 3; i++) setTimeout(spawnMeteor, i * 800);

        function drawStars() {
            ctx.clearRect(0, 0, W, H);

            stars.forEach(s => {
                const flicker = 0.7 + 0.3 * Math.sin(Date.now() * s.speed);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 240, 220, ${s.alpha * flicker})`;
                ctx.fill();
            });

            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                m.x += m.vx;
                m.y += m.vy;
                m.life--;

                const progress = 1 - (m.life / m.maxLife);
                const alpha = 1 - progress * 0.9;

                const gradient = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.size * 8);
                gradient.addColorStop(0, `rgba(255, 240, 230, ${alpha})`);
                gradient.addColorStop(0.3, `rgba(200, 180, 255, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                ctx.beginPath();
                ctx.arc(m.x, m.y, m.size * 6, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(m.x, m.y, m.size * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
                ctx.fill();

                if (m.life <= 0 || m.x > W + 50 || m.y > H + 50) {
                    meteors.splice(i, 1);
                }
            }

            requestAnimationFrame(drawStars);
        }
        drawStars();

        // ============================================================
        // MÚSICA DE FUNDO
        // ============================================================
        const musicBtn = document.getElementById('musicBtn');
        let audioFundo = null;
        let isPlayingFundo = false;

        function initAudioFundo() {
            if (!audioFundo) {
                audioFundo = new Audio('background-music.mp3');
                audioFundo.loop = true;
                audioFundo.volume = 0.3;
            }
        }

        function toggleMusicFundo() {
            initAudioFundo();
            if (isPlayingFundo) {
                audioFundo.pause();
                isPlayingFundo = false;
                musicBtn.textContent = '🔇';
            } else {
                audioFundo.play().catch(() => {});
                isPlayingFundo = true;
                musicBtn.textContent = '🔊';
            }
        }

        musicBtn.addEventListener('click', toggleMusicFundo);

        document.addEventListener('click', () => {
            if (!audioFundo) {
                initAudioFundo();
                audioFundo.play().then(() => {
                    isPlayingFundo = true;
                    musicBtn.textContent = '🔊';
                }).catch(() => {});
            }
        }, { once: true });

        // ============================================================
        // ANIMAÇÃO DE VIAGEM
        // ============================================================
        const botoesViagem = document.querySelectorAll('.lado');

        botoesViagem.forEach(botao => {
            botao.addEventListener('click', function(e) {
                e.preventDefault();

                const destino = this.dataset.destino;
                const nomeEstrela = this.dataset.estrela;

                let corDestaque;
                if (nomeEstrela === 'Aquário') corDestaque = '#7a9cff';
                else if (nomeEstrela === 'Câncer') corDestaque = '#66cc99';
                else if (nomeEstrela === 'Leão') corDestaque = '#ffaa44';
                else if (nomeEstrela === 'Capricórnio') corDestaque = '#d4a373';
                else corDestaque = '#ffffff';

                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100vw;
                    height: 100vh;
                    background: #0a0a0f;
                    z-index: 9999;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    flex-direction: column;
                    transition: opacity 0.5s ease;
                    opacity: 0;
                `;
                document.body.appendChild(overlay);

                const tunnelStars = document.createElement('canvas');
                tunnelStars.style.cssText = `
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                `;
                overlay.appendChild(tunnelStars);

                const starName = document.createElement('div');
                starName.style.cssText = `
                    position: absolute;
                    color: ${corDestaque};
                    font-family: 'Cinzel', serif;
                    font-size: 3rem;
                    text-shadow: 0 0 60px ${corDestaque}40;
                    opacity: 0;
                    transition: opacity 1s ease;
                    z-index: 10;
                    letter-spacing: 0.2em;
                `;
                starName.textContent = `✦ ${nomeEstrela} ✦`;
                overlay.appendChild(starName);

                setTimeout(() => {
                    overlay.style.opacity = '1';
                }, 50);

                const tCtx = tunnelStars.getContext('2d');
                let tW, tH;

                function resizeTunnel() {
                    tW = tunnelStars.width = window.innerWidth;
                    tH = tunnelStars.height = window.innerHeight;
                }
                resizeTunnel();
                window.addEventListener('resize', resizeTunnel);

                const starTunnel = [];
                for (let i = 0; i < 300; i++) {
                    starTunnel.push({
                        x: (Math.random() - 0.5) * tW * 2,
                        y: (Math.random() - 0.5) * tH * 2,
                        z: Math.random() * 1000,
                        speed: 5 + Math.random() * 8,
                        size: Math.random() * 3 + 0.5,
                        color: Math.random() > 0.7 ? corDestaque : '#ffffff'
                    });
                }

                let frame = 0;
                const totalFrames = 120;

                function drawTunnel() {
                    tCtx.clearRect(0, 0, tW, tH);

                    const centerX = tW / 2;
                    const centerY = tH / 2;

                    starTunnel.forEach(s => {
                        s.z -= s.speed;

                        if (s.z <= 0) {
                            s.z = 1000;
                            s.x = (Math.random() - 0.5) * tW * 2;
                            s.y = (Math.random() - 0.5) * tH * 2;
                        }

                        const scale = 800 / s.z;
                        const x = centerX + s.x * scale;
                        const y = centerY + s.y * scale;
                        const size = s.size * scale;

                        if (x > -50 && x < tW + 50 && y > -50 && y < tH + 50) {
                            const alpha = Math.min(1, 1 - (s.z / 1000));
                            tCtx.beginPath();
                            tCtx.arc(x, y, Math.max(0.5, size), 0, Math.PI * 2);
                            tCtx.fillStyle = s.color;
                            tCtx.globalAlpha = alpha * 0.9;
                            tCtx.fill();
                            tCtx.globalAlpha = 1;
                        }
                    });

                    frame++;

                    if (frame > 40 && frame < 80) {
                        starName.style.opacity = Math.min(1, (frame - 40) / 15);
                        starName.style.transform = `scale(${1 + (frame - 40) * 0.008})`;
                    } else if (frame >= 80) {
                        starName.style.opacity = Math.max(0, 1 - (frame - 80) / 15);
                    }

                    if (frame < totalFrames) {
                        requestAnimationFrame(drawTunnel);
                    } else {
                        window.location.href = destino;
                    }
                }

                drawTunnel();
            });
        });

        console.log('🌌 Constelações — página inicial carregada.');
        console.log('🚀 Clique em qualquer constelação para uma viagem interestelar!');
        console.log('♑ Capricórnio linkado para capricornio.html');
    </script>

</body>
