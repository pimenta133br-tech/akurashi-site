<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Câncer — Histórias</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0f;
            color: #e0d6c8;
            font-family: 'Lora', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        #oceano-fundo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 30% 40%, rgba(20, 80, 100, 0.15), transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(10, 60, 80, 0.10), transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(30, 100, 120, 0.08), transparent 50%);
            animation: ondasMar 10s ease-in-out infinite alternate;
        }

        @keyframes ondasMar {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-15px) scale(1.03);
                opacity: 0.9;
            }
            100% {
                transform: translateY(10px) scale(0.97);
                opacity: 0.7;
            }
        }

        .bolha {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(102, 204, 153, 0.15), rgba(102, 204, 153, 0.02));
            pointer-events: none;
            z-index: 0;
            animation: subirBolha 15s linear infinite;
        }

        @keyframes subirBolha {
            0% {
                transform: translateY(100vh) scale(0.3);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .titulo-principal {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 4.5vw, 3.5rem);
            color: #88ddbb;
            text-shadow: 0 0 60px rgba(102, 204, 153, 0.25);
            letter-spacing: 0.3em;
            text-align: center;
            padding: 2rem 1rem 1rem;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            flex-shrink: 0;
            position: relative;
        }

        .titulo-principal::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(102, 204, 153, 0.3), transparent);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .historias-wrapper {
            display: flex;
            flex: 1;
            width: 100%;
            min-height: 0;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        .opcao {
            flex: 1;
            max-width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            padding: 2rem;
            background: transparent;
            border: none;
            opacity: 0;
            animation: fadeInOpcao 1.8s ease forwards;
            height: 100%;
        }

        .opcao::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 0;
            border-radius: 0;
        }

        .opcao:hover::before {
            opacity: 1;
        }

        .opcao:hover {
            transform: scale(1.03);
        }

        .opcao-mare {
            animation-delay: 0.4s;
        }
        .opcao-desconhecido {
            animation-delay: 0.8s;
        }

        @keyframes fadeInOpcao {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .divisoria {
            width: 1px;
            height: 50%;
            background: linear-gradient(to bottom, transparent, rgba(102, 204, 153, 0.15), transparent);
            flex-shrink: 0;
            z-index: 2;
            position: relative;
        }

        .opcao-conteudo {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
        }

        .simbolo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            font-size: 4.5rem;
            font-family: 'Cinzel', serif;
            animation: respirar 3s ease-in-out infinite;
        }

        @keyframes respirar {
            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px rgba(102, 204, 153, 0.05));
            }
            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 40px rgba(102, 204, 153, 0.12));
            }
        }

        .opcao:hover .simbolo-wrapper {
            animation: none;
            transform: rotate(8deg) scale(1.1);
        }

        .simbolo-wrapper::before {
            content: '';
            position: absolute;
            width: 180%;
            height: 180%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 204, 153, 0.04), transparent 70%);
            opacity: 0;
            transition: opacity 1s ease;
            z-index: -1;
        }

        .opcao:hover .simbolo-wrapper::before {
            opacity: 1;
        }

        .simbolo-wrapper .orbita {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(102, 204, 153, 0.04);
            animation: orbitar 20s linear infinite;
            pointer-events: none;
        }

        .simbolo-wrapper .orbita-1 {
            width: 160%;
            height: 160%;
        }

        .simbolo-wrapper .orbita-2 {
            width: 200%;
            height: 200%;
            animation-duration: 30s;
            animation-direction: reverse;
        }

        @keyframes orbitar {
            to {
                transform: rotate(360deg);
            }
        }

        .opcao-nome {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.4rem, 2.8vw, 2.2rem);
            margin-top: 1rem;
            letter-spacing: 0.15em;
            transition: all 0.4s ease;
            font-weight: 400;
        }

        .opcao:hover .opcao-nome {
            letter-spacing: 0.3em;
        }

        .opcao-status {
            font-size: clamp(0.7rem, 1vw, 0.9rem);
            color: #6a7f7a;
            letter-spacing: 0.1em;
            margin-top: 0.4rem;
            opacity: 0.6;
            transition: opacity 0.4s ease;
        }

        .opcao:hover .opcao-status {
            opacity: 1;
        }

        .linha-decorativa {
            width: 30px;
            height: 1px;
            margin-top: 0.5rem;
            transition: all 0.6s ease;
            opacity: 0.3;
        }

        .opcao:hover .linha-decorativa {
            width: 50px;
            opacity: 0.8;
        }

        /* ============================================================
           CORES
        ============================================================ */
        .opcao-mare .simbolo-svg {
            color: #66cc99;
        }
        .opcao-mare .simbolo-svg .traco {
            stroke: #66cc99;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .opcao-mare .simbolo-svg .preenchimento {
            fill: #66cc99;
            opacity: 0.3;
        }
        .opcao-mare .opcao-nome {
            color: #66cc99;
        }
        .opcao-mare .linha-decorativa {
            background: linear-gradient(to right, transparent, #66cc99, transparent);
        }
        .opcao-mare::before {
            background: radial-gradient(ellipse at center, rgba(102, 204, 153, 0.05), transparent 70%);
        }
        .opcao-mare:hover::before {
            background: radial-gradient(ellipse at center, rgba(102, 204, 153, 0.12), transparent 70%);
        }
        .opcao-mare .particula {
            background: #66cc99;
            box-shadow: 0 0 10px rgba(102, 204, 153, 0.3);
        }

        .opcao-desconhecido .simbolo-svg {
            color: #88aacc;
        }
        .opcao-desconhecido .simbolo-svg .traco {
            stroke: #88aacc;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .opcao-desconhecido .simbolo-svg .preenchimento {
            fill: #88aacc;
            opacity: 0.3;
        }
        .opcao-desconhecido .opcao-nome {
            color: #88aacc;
        }
        .opcao-desconhecido .linha-decorativa {
            background: linear-gradient(to right, transparent, #88aacc, transparent);
        }
        .opcao-desconhecido::before {
            background: radial-gradient(ellipse at center, rgba(136, 170, 204, 0.05), transparent 70%);
        }
        .opcao-desconhecido:hover::before {
            background: radial-gradient(ellipse at center, rgba(136, 170, 204, 0.12), transparent 70%);
        }
        .opcao-desconhecido .particula {
            background: #88aacc;
            box-shadow: 0 0 10px rgba(136, 170, 204, 0.3);
        }

        /* ============================================================
           RESPONSIVIDADE
        ============================================================ */
        @media (max-width: 768px) {
            .historias-wrapper {
                flex-direction: column;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
            }

            .opcao {
                flex: 1 1 100%;
                max-width: 100%;
                padding: 1rem;
                min-height: 40vh;
            }

            .divisoria {
                width: 60%;
                height: 1px;
                margin: 0 auto;
                background: linear-gradient(to right, transparent, rgba(102, 204, 153, 0.15), transparent);
            }

            .simbolo-wrapper {
                width: 90px;
                height: 90px;
                font-size: 3.5rem;
            }

            .simbolo-wrapper .orbita-1 {
                width: 150%;
                height: 150%;
            }
            .simbolo-wrapper .orbita-2 {
                width: 180%;
                height: 180%;
            }

            .titulo-principal {
                padding: 1.2rem 1rem 0.5rem;
                font-size: clamp(1.4rem, 4vw, 2rem);
            }

            .opcao-nome {
                font-size: clamp(1.1rem, 2.5vw, 1.5rem);
                margin-top: 0.6rem;
            }

            .opcao-status {
                font-size: 0.6rem;
                margin-top: 0.3rem;
            }

            .linha-decorativa {
                width: 25px;
                margin-top: 0.3rem;
            }

            .opcao:hover .linha-decorativa {
                width: 40px;
            }
        }

        @media (max-width: 480px) {
            .simbolo-wrapper {
                width: 65px;
                height: 65px;
                font-size: 2.5rem;
            }
            .opcao {
                padding: 0.5rem;
                min-height: 30vh;
            }
            .opcao-nome {
                font-size: 0.9rem;
                margin-top: 0.4rem;
            }
            .opcao-status {
                font-size: 0.5rem;
            }
            .titulo-principal {
                font-size: 1.1rem;
                padding: 0.8rem 0.5rem 0.3rem;
            }
            .titulo-principal::after {
                width: 60px;
            }
            .divisoria {
                width: 50%;
            }
            .simbolo-wrapper .orbita-1,
            .simbolo-wrapper .orbita-2 {
                display: none;
            }
            .linha-decorativa {
                width: 15px;
                margin-top: 0.2rem;
            }
            .opcao:hover .linha-decorativa {
                width: 25px;
            }
        }

        .music-control {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 10;
            background: rgba(10, 25, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(180, 150, 200, 0.12);
            color: #d4c8e8;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .music-control:hover {
            background: rgba(20, 40, 50, 0.9);
            border-color: #66cc99;
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(102, 204, 153, 0.05);
        }
    </style>
</head>
<body>

    <div id="oceano-fundo"></div>
    <canvas id="stars-canvas"></canvas>

    <div id="bolhas-container"></div>

    <button class="music-control" id="musicBtn" aria-label="Controle de música">🔊</button>

    <div class="container">

        <h1 class="titulo-principal">
            ✦ Câncer ✦
        </h1>

        <div class="historias-wrapper">

            <!-- ===================== MARÉ ===================== -->
            <div class="opcao opcao-mare" data-destino="mare.html" data-estrela="Maré">
                <div class="opcao-conteudo">
                    <div class="simbolo-wrapper">
                        <span class="particula" style="top:5%;left:10%;width:3px;height:3px;"></span>
                        <span class="particula" style="top:15%;right:5%;width:2px;height:2px;"></span>
                        <span class="particula" style="bottom:20%;left:5%;width:4px;height:4px;"></span>
                        <span class="particula" style="bottom:5%;right:15%;width:2px;height:2px;"></span>
                        <span class="particula" style="top:40%;left:-10%;width:3px;height:3px;"></span>
                        <span class="particula" style="top:50%;right:-8%;width:2px;height:2px;"></span>

                        <span class="orbita orbita-1"></span>
                        <span class="orbita orbita-2"></span>

                        <svg class="simbolo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path class="traco" d="M30 40 C20 25, 40 15, 50 25 C60 15, 80 25, 70 40" />
                            <path class="traco" d="M35 45 L30 60" />
                            <path class="traco" d="M65 45 L70 60" />
                            <path class="traco" d="M30 40 C22 35, 18 28, 25 22" />
                            <path class="traco" d="M70 40 C78 35, 82 28, 75 22" />
                            <circle class="preenchimento" cx="42" cy="30" r="2.5" />
                            <circle class="preenchimento" cx="58" cy="30" r="2.5" />
                            <path class="traco" d="M35 45 C40 55, 60 55, 65 45" />
                            <path class="traco" d="M38 48 C35 58, 28 62, 25 70" />
                            <path class="traco" d="M45 50 C42 60, 40 68, 42 75" />
                            <path class="traco" d="M55 50 C58 60, 60 68, 58 75" />
                            <path class="traco" d="M62 48 C65 58, 72 62, 75 70" />
                        </svg>
                    </div>
                    <span class="opcao-nome">Maré</span>
                    <span class="linha-decorativa"></span>
                    <span class="opcao-status">✦ Disponível ✦</span>
                </div>
            </div>

            <!-- ===================== DIVISÓRIA ===================== -->
            <div class="divisoria"></div>

            <!-- ===================== DESCONHECIDO ===================== -->
            <div class="opcao opcao-desconhecido" data-destino="#" data-estrela="?">
                <div class="opcao-conteudo">
                    <div class="simbolo-wrapper">
                        <span class="particula" style="top:8%;left:8%;width:2px;height:2px;"></span>
                        <span class="particula" style="top:20%;right:10%;width:3px;height:3px;"></span>
                        <span class="particula" style="bottom:15%;left:12%;width:2px;height:2px;"></span>
                        <span class="particula" style="bottom:10%;right:8%;width:3px;height:3px;"></span>
                        <span class="particula" style="top:50%;left:-8%;width:2px;height:2px;"></span>
                        <span class="particula" style="top:40%;right:-10%;width:3px;height:3px;"></span>

                        <span class="orbita orbita-1"></span>
                        <span class="orbita orbita-2"></span>

                        <svg class="simbolo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <text class="traco" x="50" y="65" font-size="50" text-anchor="middle" font-family="Cinzel" fill="none" stroke="currentColor" stroke-width="2">?</text>
                        </svg>
                    </div>
                    <span class="opcao-nome">?</span>
                    <span class="linha-decorativa"></span>
                    <span class="opcao-status">◈ Em breve ◈</span>
                </div>
            </div>

        </div>

    </div>

    <script>
        // ============================================================
        // ESTRELAS CADENTES
        // ============================================================
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const stars = [];
        for (let i = 0; i < 220; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.5 + 0.5,
                alpha: Math.random() * 0.8 + 0.2,
                speed: Math.random() * 0.008 + 0.003,
            });
        }

        let meteors = [];

        function spawnMeteor() {
            const x = Math.random() * W * 0.8 + W * 0.1;
            const y = Math.random() * H * 0.3;
            const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5;
            const speed = 6 + Math.random() * 10;
            const life = 120 + Math.random() * 100;
            meteors.push({
                x,
                y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life,
                maxLife: life,
                size: 2 + Math.random() * 2
            });
        }

        setInterval(() => {
            if (meteors.length < 6) spawnMeteor();
        }, 3000 + Math.random() * 4000);

        for (let i = 0; i < 3; i++) setTimeout(spawnMeteor, i * 800);

        function drawStars() {
            ctx.clearRect(0, 0, W, H);

            stars.forEach(s => {
                const flicker = 0.7 + 0.3 * Math.sin(Date.now() * s.speed);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 240, 220, ${s.alpha * flicker})`;
                ctx.fill();
            });

            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                m.x += m.vx;
                m.y += m.vy;
                m.life--;

                const progress = 1 - (m.life / m.maxLife);
                const alpha = 1 - progress * 0.9;

                const gradient = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.size * 8);
                gradient.addColorStop(0, `rgba(255, 240, 230, ${alpha})`);
                gradient.addColorStop(0.3, `rgba(200, 180, 255, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                ctx.beginPath();
                ctx.arc(m.x, m.y, m.size * 6, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(m.x, m.y, m.size * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
                ctx.fill();

                if (m.life <= 0 || m.x > W + 50 || m.y > H + 50) {
                    meteors.splice(i, 1);
                }
            }

            requestAnimationFrame(drawStars);
        }
        drawStars();

        // ============================================================
        // BOLHAS
        // ============================================================
        const bolhasContainer = document.getElementById('bolhas-container');
        for (let i = 0; i < 15; i++) {
            const bolha = document.createElement('div');
            bolha.className = 'bolha';
            const size = 10 + Math.random() * 30;
            bolha.style.width = size + 'px';
            bolha.style.height = size + 'px';
            bolha.style.left = Math.random() * 100 + '%';
            bolha.style.animationDelay = Math.random() * 15 + 's';
            bolha.style.animationDuration = 12 + Math.random() * 10 + 's';
            bolhasContainer.appendChild(bolha);
        }

        // ============================================================
        // MÚSICA DE FUNDO
        // ============================================================
        const musicBtn = document.getElementById('musicBtn');
        let audioFundo = null;
        let isPlayingFundo = false;

        function initAudioFundo() {
            if (!audioFundo) {
                audioFundo = new Audio('background-music.mp3');
                audioFundo.loop = true;
                audioFundo.volume = 0.3;
            }
        }

        function toggleMusicFundo() {
            initAudioFundo();
            if (isPlayingFundo) {
                audioFundo.pause();
                isPlayingFundo = false;
                musicBtn.textContent = '🔇';
            } else {
                audioFundo.play().catch(() => {});
                isPlayingFundo = true;
                musicBtn.textContent = '🔊';
            }
        }

        musicBtn.addEventListener('click', toggleMusicFundo);

        document.addEventListener('click', () => {
            if (!audioFundo) {
                initAudioFundo();
                audioFundo.play().then(() => {
                    isPlayingFundo = true;
                    musicBtn.textContent = '🔊';
                }).catch(() => {});
            }
        }, { once: true });

        // ============================================================
        // ANIMAÇÃO DE VIAGEM
        // ============================================================
        const opcoes = document.querySelectorAll('.opcao');

        opcoes.forEach(opcao => {
            opcao.addEventListener('click', function(e) {
                e.preventDefault();

                const destino = this.dataset.destino;
                const nomeEstrela = this.dataset.estrela;

                let corDestaque;
                if (nomeEstrela === 'Maré') corDestaque = '#66cc99';
                else corDestaque = '#88aacc';

                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100vw;
                    height: 100vh;
                    background: #0a0a0f;
                    z-index: 9999;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    flex-direction: column;
                    transition: opacity 0.5s ease;
                    opacity: 0;
                `;
                document.body.appendChild(overlay);

                const tunnelStars = document.createElement('canvas');
                tunnelStars.style.cssText = `
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                `;
                overlay.appendChild(tunnelStars);

                const starName = document.createElement('div');
                starName.style.cssText = `
                    position: absolute;
                    color: ${corDestaque};
                    font-family: 'Cinzel', serif;
                    font-size: 3rem;
                    text-shadow: 0 0 60px ${corDestaque}40;
                    opacity: 0;
                    transition: opacity 1s ease;
                    z-index: 10;
                    letter-spacing: 0.2em;
                `;
                starName.textContent = `✦ ${nomeEstrela} ✦`;
                overlay.appendChild(starName);

                setTimeout(() => {
                    overlay.style.opacity = '1';
                }, 50);

                const tCtx = tunnelStars.getContext('2d');
                let tW, tH;

                function resizeTunnel() {
                    tW = tunnelStars.width = window.innerWidth;
                    tH = tunnelStars.height = window.innerHeight;
                }
                resizeTunnel();
                window.addEventListener('resize', resizeTunnel);

                const starTunnel = [];
                for (let i = 0; i < 300; i++) {
                    starTunnel.push({
                        x: (Math.random() - 0.5) * tW * 2,
                        y: (Math.random() - 0.5) * tH * 2,
                        z: Math.random() * 1000,
                        speed: 5 + Math.random() * 8,
                        size: Math.random() * 3 + 0.5,
                        color: Math.random() > 0.7 ? corDestaque : '#ffffff'
                    });
                }

                let frame = 0;
                const totalFrames = 120;

                function drawTunnel() {
                    tCtx.clearRect(0, 0, tW, tH);

                    const centerX = tW / 2;
                    const centerY = tH / 2;

                    starTunnel.forEach(s => {
                        s.z -= s.speed;

                        if (s.z <= 0) {
                            s.z = 1000;
                            s.x = (Math.random() - 0.5) * tW * 2;
                            s.y = (Math.random() - 0.5) * tH * 2;
                        }

                        const scale = 800 / s.z;
                        const x = centerX + s.x * scale;
                        const y = centerY + s.y * scale;
                        const size = s.size * scale;

                        if (x > -50 && x < tW + 50 && y > -50 && y < tH + 50) {
                            const alpha = Math.min(1, 1 - (s.z / 1000));
                            tCtx.beginPath();
                            tCtx.arc(x, y, Math.max(0.5, size), 0, Math.PI * 2);
                            tCtx.fillStyle = s.color;
                            tCtx.globalAlpha = alpha * 0.9;
                            tCtx.fill();
                            tCtx.globalAlpha = 1;
                        }
                    });

                    frame++;

                    if (frame > 40 && frame < 80) {
                        starName.style.opacity = Math.min(1, (frame - 40) / 15);
                        starName.style.transform = `scale(${1 + (frame - 40) * 0.008})`;
                    } else if (frame >= 80) {
                        starName.style.opacity = Math.max(0, 1 - (frame - 80) / 15);
                    }

                    if (frame < totalFrames) {
                        requestAnimationFrame(drawTunnel);
                    } else {
                        window.location.href = destino;
                    }
                }

                drawTunnel();
            });
        });

        console.log('🦀 Câncer — página de seleção carregada.');
        console.log('📖 Duas histórias: Maré e ?');
        console.log('🚀 Clique em qualquer opção para uma viagem interestelar!');
    </script>
